<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERK TIME BOMB</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: #fff;
        }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(192,192,192,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(128,128,128,0.1) 0%, transparent 50%);
            z-index: -1;
        }
        .login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
            z-index: 1000; transition: opacity 0.5s;
        }
        .login.hidden { opacity: 0; pointer-events: none; }
        .shield {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #c0c0c0, #808080);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-bottom: 20px; box-shadow: 0 0 30px rgba(192,192,192,0.3);
        }
        .logo-text { font-size: 42px; font-weight: 900; letter-spacing: 8px; color: #c0c0c0; }
        .logo-sub { font-size: 20px; color: #808080; letter-spacing: 10px; margin-bottom: 40px; }
        .login-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 30px; width: 90%; max-width: 400px;
        }
        .login-box input {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.3);
            border: 2px solid rgba(192,192,192,0.3); border-radius: 10px;
            color: #fff; font-size: 16px; font-family: 'Tajawal', sans-serif; margin-bottom: 15px;
        }
        .login-box input:focus { outline: none; border-color: #c0c0c0; }
        .login-box button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #c0c0c0, #808080);
            border: none; border-radius: 10px; color: #1a1a2e;
            font-size: 18px; font-weight: 700; font-family: 'Tajawal', sans-serif; cursor: pointer;
        }
        .main { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .main.active { display: block; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(255,255,255,0.05);
            border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-shield {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #c0c0c0, #808080);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .header-title { font-size: 20px; font-weight: 900; color: #c0c0c0; }
        .user { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #c0c0c0, #808080);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: #1a1a2e;
        }
        .buttons {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
        .btn {
            padding: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-family: 'Tajawal', sans-serif;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; text-align: center;
        }
        .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(192,192,192,0.5); transform: translateY(-3px); }
        .btn span { display: block; font-size: 28px; font-weight: 900; color: #c0c0c0; margin-bottom: 8px; }
        .section {
            display: none; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 25px; margin-bottom: 20px;
        }
        .section.active { display: block; }
        .section-title { font-size: 24px; font-weight: 900; color: #c0c0c0; text-align: center; margin-bottom: 20px; }
        .top-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; background: rgba(0,0,0,0.2);
            border-radius: 10px; margin-bottom: 10px; transition: all 0.3s;
        }
        .top-item:hover { background: rgba(255,255,255,0.05); }
        .rank { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; font-size: 16px; }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #B8860B); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #808080); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #8B4513); color: #fff; }
        .rank-other { background: rgba(255,255,255,0.1); color: #c0c0c0; }
        .player-info { flex: 1; }
        .player-name { font-weight: 700; }
        .player-status { font-size: 12px; color: #808080; }
        .apply-btn {
            padding: 8px 16px; background: linear-gradient(135deg, #c0c0c0, #808080);
            border: none; border-radius: 8px; color: #1a1a2e;
            font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif;
        }
        .chat-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 999; padding: 20px;
        }
        .chat-overlay.active { display: flex; align-items: center; justify-content: center; }
        .chat-box {
            width: 100%; max-width: 800px; height: 80vh;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            padding: 15px 20px; background: rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .chat-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, #c0c0c0, #808080);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #1a1a2e;
        }
        .chat-close { margin-right: auto; background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; }
        .msg-admin { align-self: flex-start; background: rgba(192,192,192,0.15); border: 1px solid rgba(192,192,192,0.2); }
        .msg-user { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
        .msg-author { font-size: 12px; font-weight: 700; color: #c0c0c0; margin-bottom: 4px; }
        .msg-text { font-size: 14px; }
        .msg-time { font-size: 10px; color: #666; margin-top: 4px; }
        .chat-input { padding: 15px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Tajawal', sans-serif; }
        .chat-input input:focus { outline: none; border-color: rgba(192,192,192,0.5); }
        .chat-input button { padding: 12px 20px; background: linear-gradient(135deg, #c0c0c0, #808080); border: none; border-radius: 10px; color: #1a1a2e; font-weight: 700; font-family: 'Tajawal', sans-serif; cursor: pointer; }
        .result-card { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .result-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .vs { display: flex; align-items: center; justify-content: center; gap: 25px; }
        .vs-player { text-align: center; }
        .vs-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #c0c0c0, #808080); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #1a1a2e; margin: 0 auto 8px; }
        .vs-name { font-weight: 700; }
        .vs-score { font-size: 36px; font-weight: 900; color: #c0c0c0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #c0c0c0; font-weight: 700; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Tajawal', sans-serif; }
        .form-group input:focus { outline: none; border-color: rgba(192,192,192,0.5); }
        .file-box { border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; }
        .file-box:hover { border-color: rgba(192,192,192,0.5); }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #c0c0c0, #808080); border: none; border-radius: 10px; color: #1a1a2e; font-size: 18px; font-weight: 900; font-family: 'Tajawal', sans-serif; cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(192,192,192,0.3); border-radius: 3px; }
        @media (max-width: 600px) { .logo-text { font-size: 28px; } .buttons { grid-template-columns: 1fr; } .vs { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="login" id="loginScreen">
        <div class="shield"></div>
        <div class="logo-text">PERK</div>
        <div class="logo-sub">TIME BOMB</div>
        <div class="login-box">
            <input type="text" id="playerName" placeholder="اكتب اسمك" maxlength="20">
            <button onclick="enter()">دخول</button>
        </div>
    </div>
    <div class="main" id="main">
        <div class="header">
            <div class="header-left">
                <div class="header-shield"></div>
                <div class="header-title">PERK TIME BOMB</div>
            </div>
            <div class="user">
                <div id="displayName">اللاعب</div>
                <div class="user-avatar" id="userAvatar">P</div>
            </div>
        </div>
        <div class="buttons">
            <button class="btn" onclick="show('top')"><span>T</span>التوب 15</button>
            <button class="btn" onclick="openChat()"><span>C</span>محادثة</button>
            <button class="btn" onclick="show('results')"><span>R</span>النتائج</button>
            <button class="btn" onclick="show('submit')"><span>S</span>إرسال نتيجة</button>
        </div>
        <div class="section" id="secTop">
            <div class="section-title">التوب 15</div>
            <div id="topList"></div>
        </div>
        <div class="section" id="secResults">
            <div class="section-title">النتائج</div>
            <div id="resultsList"></div>
        </div>
        <div class="section" id="secSubmit">
            <div class="section-title">إرسال نتيجة</div>
            <div class="form-group"><label>الخصم</label><input type="text" id="oppName" placeholder="اسم الخصم"></div>
            <div class="form-group"><label>نتيجتك</label><input type="number" id="myScore" placeholder="0" min="0"></div>
            <div class="form-group"><label>نتيجة الخصم</label><input type="number" id="oppScore" placeholder="0" min="0"></div>
            <div class="form-group"><label>صورة</label><div class="file-box" onclick="document.getElementById('fileIn').click()">اضغط لرفع الصورة<input type="file" id="fileIn" hidden accept="image/*"></div><p id="fileName" style="color:#808080; font-size:12px; margin-top:5px;"></p></div>
            <button class="submit-btn" onclick="sendResult()">إرسال</button>
        </div>
    </div>
    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-box">
            <div class="chat-header">
                <div class="chat-avatar">A</div>
                <div><div style="font-weight:700;">إدارة PERK</div><div style="font-size:12px; color:#808080;">متصل</div></div>
                <button class="chat-close" onclick="closeChat()">X</button>
            </div>
            <div class="chat-messages" id="chatMsg"><div class="msg msg-admin"><div class="msg-author">الإدارة</div><div class="msg-text">مرحباً! كيف يمكنني مساعدتك؟</div><div class="msg-time">الآن</div></div></div>
            <div class="chat-input"><input type="text" id="chatIn" placeholder="اكتب..." onkeypress="if(event.key==='Enter') sendMsg()"><button onclick="sendMsg()">إرسال</button></div>
        </div>
    </div>
    <script>
        const DB_URL = 'https://jsonblob.com/api/jsonBlob/YOUR_BLOB_ID'; // غير هذا الرابط
        let user = '';
        let players = [];
        let results = [];
        let msgs = [];
        let apps = [];

        async function loadDB() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                players = data.players || [];
                results = data.results || [];
                msgs = data.msgs || [];
                apps = data.apps || [];
            } catch(e) { initDefault(); }
        }

        async function saveDB() {
            await fetch(DB_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ players, results, msgs, apps })
            });
        }

        function initDefault() {
            players = [];
            for(let i=1; i<=15; i++) players.push({rank:i, name:`المركز ${i}`, status:'متاح', wins:0, losses:0});
            saveDB();
        }

        function enter() {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return alert('اكتب اسمك');
            user = name;
            document.getElementById('displayName').textContent = name;
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('loginScreen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('main').classList.add('active');
            }, 500);
            loadDB().then(renderTop);
        }

        function show(sec) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            if(sec==='top') { document.getElementById('secTop').classList.add('active'); renderTop(); }
            else if(sec==='results') { document.getElementById('secResults').classList.add('active'); renderResults(); }
            else if(sec==='submit') document.getElementById('secSubmit').classList.add('active');
        }

        function renderTop() {
            const list = document.getElementById('topList');
            list.innerHTML = '';
            players.sort((a,b) => a.rank-b.rank);
            players.forEach(p => {
                const rc = p.rank===1?'rank-1':p.rank===2?'rank-2':p.rank===3?'rank-3':'rank-other';
                const taken = p.name!==`المركز ${p.rank}` && p.name!=='فارغ';
                const div = document.createElement('div');
                div.className = 'top-item';
                div.innerHTML = `<div class="rank ${rc}">${p.rank}</div><div class="player-info"><div class="player-name">${p.name}</div><div class="player-status">${p.status} | ف: ${p.wins} | خ: ${p.losses}</div></div><button class="apply-btn" onclick="apply(${p.rank})">${taken?'تحدي':'تقديم'}</button>`;
                list.appendChild(div);
            });
        }

        async function apply(rank) {
            const ex = apps.find(a => a.name===user && a.status==='pending');
            if(ex) return alert('عندك طلب قيد المراجعة');
            apps.push({id:Date.now(), name:user, rank:rank, status:'pending', time:new Date().toLocaleString('ar-SA')});
            await saveDB();
            openChat();
            setTimeout(() => addMsg('user', `أبي أتقدم على المركز ${rank}`), 300);
        }

        function openChat() { document.getElementById('chatOverlay').classList.add('active'); loadChat(); }
        function closeChat() { document.getElementById('chatOverlay').classList.remove('active'); }

        function loadChat() {
            const box = document.getElementById('chatMsg');
            box.innerHTML = '<div class="msg msg-admin"><div class="msg-author">الإدارة</div><div class="msg-text">مرحباً! كيف يمكنني مساعدتك؟</div><div class="msg-time">الآن</div></div>';
            const myMsgs = msgs.filter(m => m.sender===user || m.receiver===user || m.sender==='admin');
            myMsgs.forEach(m => addMsgToBox(m.sender==='admin'?'msg-admin':'msg-user', m.sender==='admin'?'الإدارة':m.sender, m.text, m.time));
        }

        async function sendMsg() {
            const input = document.getElementById('chatIn');
            const text = input.value.trim();
            if(!text) return;
            msgs.push({sender:user, receiver:'admin', text, time:new Date().toLocaleTimeString('ar-SA')});
            await saveDB();
            addMsgToBox('msg-user', user, text, 'الآن');
            input.value = '';
        }

        function addMsgToBox(type, author, text, time) {
            const box = document.getElementById('chatMsg');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<div class="msg-author">${author}</div><div class="msg-text">${text}</div><div class="msg-time">${time}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function renderResults() {
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            if(results.length===0) { list.innerHTML = '<p style="text-align:center; color:#808080;">ما في نتائج</p>'; return; }
            results.forEach(r => {
                const div = document.createElement('div');
                div.className = 'result-card';
                div.innerHTML = `<div class="result-header"><span>${r.status==='verified'?'معتمد':'قيد المراجعة'}</span><span>${r.date}</span></div><div class="vs"><div class="vs-player"><div class="vs-avatar">${r.p1.charAt(0)}</div><div class="vs-name">${r.p1}</div></div><div class="vs-score">${r.s1} - ${r.s2}</div><div class="vs-player"><div class="vs-avatar">${r.p2.charAt(0)}</div><div class="vs-name">${r.p2}</div></div></div>`;
                list.appendChild(div);
            });
        }

        document.getElementById('fileIn').addEventListener('change', function() {
            if(this.files[0]) document.getElementById('fileName').textContent = 'تم اختيار: '+this.files[0].name;
        });

        async function sendResult() {
            const p2 = document.getElementById('oppName').value;
            const s1 = parseInt(document.getElementById('myScore').value);
            const s2 = parseInt(document.getElementById('oppScore').value);
            if(!p2 || isNaN(s1) || isNaN(s2)) return alert('املأ كل الحقول');
            results.push({p1:user, p2, s1, s2, status:'pending', date:new Date().toLocaleDateString('ar-SA')});
            await saveDB();
            alert('تم الإرسال! بانتظار توثيق الإدارة');
            show('results');
        }

        document.getElementById('playerName').addEventListener('keypress', e => { if(e.key==='Enter') enter(); });
    </script>
</body>
</html>
